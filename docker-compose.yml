services:
  api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    image: rag-support-ticket-api:latest
    container_name: rag_api
    env_file:
      - ./backend-api/.env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s   # was 30s — a bit more headroom for model init even without network download
    restart: unless-stopped
    networks:
      - triage-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked in at build time — browser talks to the backend via the
        # HOST-published port, not the internal Docker DNS name "api".
        NEXT_PUBLIC_API_URL: "http://localhost:8000"
    image: triage-frontend:latest
    container_name: triage_frontend
    environment:
      # Server-side only — used by the /api/tickets/respond route handler,
      # which runs inside the container and CAN reach "api" via Docker DNS.
      BACKEND_API_URL: "http://api:8000"
      BACKEND_API_KEY: "${API_KEY}"   # pull from repo-root .env, must match backend-api/.env's API_KEY
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - triage-net

networks:
  triage-net:
    driver: bridge